name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://render-dlhz.onrender.com
      PUBLIC_APP_URL: https://render-web-eight.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @render/events build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build API
        run: pnpm --filter @render/api build

      - name: Build Web
        run: pnpm --filter @render/web build
